<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>또리네 가계부 💜</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#0d0d1a;--bg1:#13131f;--bg2:#1a1a2e;--bg3:#1e1e32;
  --t1:#f1f5f9;--t2:#8892a4;--t3:#4a5568;
  --bd:rgba(255,255,255,0.07);--bd2:rgba(255,255,255,0.13);
  --accent:#a78bfa;--green:#34d399;--orange:#fb923c;--blue:#60a5fa;--red:#f87171;
}
.light{
  --bg:#f8f9fc;--bg1:#ffffff;--bg2:#f1f3f8;--bg3:#e8ebf2;
  --t1:#0f172a;--t2:#64748b;--t3:#94a3b8;
  --bd:rgba(0,0,0,0.07);--bd2:rgba(0,0,0,0.13);
}
body{background:var(--bg);color:var(--t1);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px;min-height:100vh;transition:background .3s,color .3s;}
input,select,textarea{font-family:inherit;font-size:13px;background:var(--bg2);border:1px solid var(--bd);border-radius:10px;color:var(--t1);padding:8px 12px;outline:none;transition:border .2s;}
input:focus,select:focus,textarea:focus{border-color:var(--accent);}
input[type=number]{text-align:right;}
input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none;}
input[type=number]{-moz-appearance:textfield;}
button{font-family:inherit;cursor:pointer;}
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-thumb{background:rgba(167,139,250,0.3);border-radius:3px;}

/* 레이아웃 */
#app{max-width:1100px;margin:0 auto;padding:20px 16px;}

/* 헤더 */
#header{position:sticky;top:0;z-index:100;background:rgba(13,13,26,0.95);backdrop-filter:blur(20px);border-bottom:1px solid var(--bd);}
.light #header{background:rgba(255,255,255,0.95);}
#header-inner{max-width:1100px;margin:0 auto;padding:0 16px;display:flex;align-items:center;justify-content:space-between;height:56px;}
#logo{display:flex;align-items:center;gap:10px;}
#logo-icon{width:30px;height:30px;border-radius:9px;background:linear-gradient(135deg,#a78bfa,#60a5fa);display:flex;align-items:center;justify-content:center;font-size:15px;}
#logo-text{font-size:16px;font-weight:700;letter-spacing:-0.5px;}
#header-btns{display:flex;gap:8px;align-items:center;}
.btn-primary{background:linear-gradient(135deg,#a78bfa,#818cf8);color:#fff;border:none;border-radius:10px;padding:7px 14px;font-size:13px;font-weight:600;}
.btn-ghost{background:var(--bg2);border:1px solid var(--bd);border-radius:10px;padding:7px 11px;font-size:14px;color:var(--t2);}

/* 탭 */
#tabs{max-width:1100px;margin:0 auto;padding:0 16px;display:flex;overflow-x:auto;gap:2px;}
.tab-btn{background:none;border:none;padding:8px 14px;font-size:13px;color:var(--t2);border-radius:8px 8px 0 0;font-weight:400;white-space:nowrap;display:flex;align-items:center;gap:5px;transition:all .15s;}
.tab-btn.active{background:var(--bg2);color:var(--accent);font-weight:600;}

/* 카드 */
.card{background:var(--bg1);border:1px solid var(--bd);border-radius:16px;}
.section-card{padding:16px 20px;margin-bottom:12px;}

/* 메트릭 그리드 */
.metric-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin-bottom:18px;}
.metric-card{padding:14px 16px;position:relative;overflow:hidden;}
.metric-label{font-size:10px;color:var(--t3);font-weight:500;letter-spacing:.5px;text-transform:uppercase;margin-bottom:7px;}
.metric-val{font-size:19px;font-weight:700;letter-spacing:-0.5px;line-height:1;}
.metric-val span{font-size:12px;font-weight:500;margin-left:2px;}
.metric-sub{font-size:11px;margin-top:4px;opacity:.8;}
.metric-icon{position:absolute;top:-8px;right:-8px;font-size:32px;opacity:.07;}

/* 진행바 */
.progress-wrap{background:var(--bg3);border-radius:8px;height:10px;overflow:hidden;}
.progress-bar{height:100%;border-radius:8px;transition:width .6s ease;}

/* 배지 */
.badge{font-size:11px;padding:2px 8px;border-radius:6px;font-weight:600;}
.badge-good{background:rgba(52,211,153,.1);color:#34d399;}
.badge-warn{background:rgba(251,146,60,.1);color:#fb923c;}
.badge-bad{background:rgba(248,113,113,.1);color:#f87171;}

/* 입력 행 */
.input-row{display:flex;align-items:center;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--bd);}
.input-row label{font-size:13px;color:var(--t2);min-width:130px;}
.input-row input{width:120px;padding:5px 10px;border-radius:8px;border:1px solid var(--bd2);}

/* 차트 컨테이너 */
.chart-wrap{position:relative;width:100%;}

/* 토스트 */
#toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#1e1e32;color:#fff;padding:10px 20px;border-radius:24px;font-size:13px;z-index:9999;border:1px solid rgba(167,139,250,.4);white-space:nowrap;display:none;}

/* 모달 */
#modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(6px);z-index:9998;display:none;align-items:center;justify-content:center;padding:20px;}
#modal-overlay.open{display:flex;}
#modal-box{background:var(--bg1);border:1px solid rgba(248,113,113,.3);border-radius:20px;padding:28px 32px;max-width:360px;width:100%;}
#modal-box h3{font-size:17px;font-weight:700;text-align:center;margin-bottom:8px;}
#modal-box p{font-size:13px;color:var(--t2);text-align:center;line-height:1.8;margin-bottom:24px;}
.modal-btns{display:flex;gap:10px;}
.btn-cancel{flex:1;background:var(--bg2);border:1px solid var(--bd);border-radius:10px;padding:11px 0;font-size:14px;color:var(--t2);font-weight:500;}
.btn-danger{flex:1;background:linear-gradient(135deg,#ef4444,#dc2626);color:#fff;border:none;border-radius:10px;padding:11px 0;font-size:14px;font-weight:700;}

/* 비어있음 */
.empty-state{text-align:center;padding:80px 0;}
.empty-state .emoji{font-size:52px;margin-bottom:16px;}
.empty-state h2{font-size:22px;font-weight:700;margin-bottom:8px;}
.empty-state p{font-size:14px;color:var(--t2);margin-bottom:24px;}

/* 히스토리 날짜 뱃지 */
.date-badge{width:42px;height:42px;border-radius:11px;background:rgba(167,139,250,.1);border:1px solid rgba(167,139,250,.2);display:flex;flex-direction:column;align-items:center;justify-content:center;flex-shrink:0;}
.date-badge .year{font-size:9px;color:var(--accent);font-weight:600;line-height:1;}
.date-badge .month{font-size:14px;color:var(--accent);font-weight:700;line-height:1.3;}

/* 반응형 */
@media(max-width:600px){
  .metric-grid{grid-template-columns:repeat(2,1fr);}
  .chart-grid{grid-template-columns:1fr!important;}
  .input-row label{min-width:100px;font-size:12px;}
  .input-row input{width:100px;}
  #header-inner{padding:0 12px;}
  #app{padding:16px 12px;}
}
</style>
</head>
<body>
<div id="toast"></div>
<div id="modal-overlay">
  <div id="modal-box">
    <div style="font-size:36px;text-align:center;margin-bottom:12px">🗑️</div>
    <h3>전체 초기화</h3>
    <p>모든 월별 데이터와 목표가 삭제됩니다.<br/><span style="color:#f87171;font-weight:600">이 작업은 되돌릴 수 없습니다.</span></p>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal()">취소</button>
      <button class="btn-danger" onclick="doReset()">초기화할게요</button>
    </div>
  </div>
</div>

<div id="header">
  <div id="header-inner">
    <div id="logo">
      <div id="logo-icon">💜</div>
      <span id="logo-text">또리네 가계부</span>
    </div>
    <div id="header-btns">
      <button class="btn-primary" onclick="startNew()">+ 이번 달 입력</button>
      <button class="btn-ghost" id="dark-btn" onclick="toggleDark()">☀️</button>
    </div>
  </div>
  <div id="tabs">
    <button class="tab-btn active" data-tab="dashboard" onclick="setTab('dashboard')">📊 대시보드</button>
    <button class="tab-btn" data-tab="input" onclick="setTab('input')">✏️ 입력</button>
    <button class="tab-btn" data-tab="living" onclick="setTab('living')">🛒 생활비</button>
    <button class="tab-btn" data-tab="assets" onclick="setTab('assets')">🏦 자산/목표</button>
    <button class="tab-btn" data-tab="history" onclick="setTab('history')">📅 히스토리</button>
  </div>
</div>

<div id="app">
  <div id="tab-dashboard" class="tab-content"></div>
  <div id="tab-input" class="tab-content" style="display:none"></div>
  <div id="tab-living" class="tab-content" style="display:none"></div>
  <div id="tab-assets" class="tab-content" style="display:none"></div>
  <div id="tab-history" class="tab-content" style="display:none"></div>
</div>

<script>
// ===== 데이터 정의 =====
const IF=[{key:"salary",label:"월 기본급"},{key:"bonus",label:"평가급"},{key:"holiday",label:"명절상여"},{key:"travel",label:"출장여비"},{key:"overtime",label:"초과근무수당"},{key:"welfare",label:"복리후생비+식비"},{key:"otherIncome",label:"기타수입"}];
const FF=[{key:"insurance",label:"보험료"},{key:"communication",label:"통신비"},{key:"subscription",label:"구독서비스"},{key:"carInsurance",label:"차량보험 월할"},{key:"carTax",label:"자동차세 월할"},{key:"maintenance",label:"주택관리비"},{key:"electricity",label:"전기요금"},{key:"water",label:"수도요금"},{key:"gas",label:"가스요금"},{key:"internet",label:"인터넷요금"},{key:"waterPurifier",label:"정수기 렌탈"},{key:"otherFixed",label:"기타 고정지출"}];
const SF=[{key:"cashSaving",label:"현금저축"},{key:"stock",label:"주식투자"},{key:"pension",label:"퇴직연금 추가납입"},{key:"housing",label:"주택자금 적립"},{key:"otherSaving",label:"기타 투자"}];
const LF=[{key:"food",label:"식비"},{key:"dining",label:"외식"},{key:"cafe",label:"카페/간식"},{key:"transport",label:"교통/주유"},{key:"shopping",label:"쇼핑"},{key:"culture",label:"문화/여행"},{key:"gift",label:"경조사/선물"},{key:"husbandAllowance",label:"남편 용돈"},{key:"wifeAllowance",label:"아내 용돈"},{key:"otherLiving",label:"기타"}];
const ASF=[{key:"cash",label:"현금"},{key:"deposit",label:"예적금"},{key:"stockAsset",label:"주식"},{key:"pensionAsset",label:"퇴직연금"},{key:"apt",label:"청약통장"},{key:"realestate",label:"부동산"},{key:"otherAsset",label:"기타자산"}];
const DF=[{key:"card",label:"신용카드 미결제"},{key:"loan",label:"대출"},{key:"otherDebt",label:"기타부채"}];
const ALL=[...IF,...FF,...SF,...LF,...ASF,...DF];
const PALETTE=["#a78bfa","#34d399","#fb923c","#60a5fa","#f472b6","#facc15","#4ade80","#38bdf8","#e879f9","#a3e635"];
const STORAGE_KEY="ttori_budget_v1";
const DEFAULT_GOALS=[{id:"g1",label:"입주자금 목표 (2028)",target:200000000},{id:"g2",label:"FIRE 목표 순자산",target:1000000000}];

// ===== 상태 =====
let months=[], goals=[...DEFAULT_GOALS], dark=true, currentTab="dashboard", editingMonth=null;
let chartPie=null, chartBar=null, chartLine=null, chartNet=null;

// ===== 유틸 =====
function empty(y,m){const o={year:y,month:m,note:""};ALL.forEach(f=>{o[f.key]=0;});return o;}
function sumF(m,fs){return fs.reduce((s,f)=>s+(Number(m[f.key])||0),0);}
function calcM(m){
  const income=sumF(m,IF),fixed=sumF(m,FF),saving=sumF(m,SF),living=sumF(m,LF);
  const budget=income-fixed-saving,remain=budget-living,savingRate=income>0?(saving/income)*100:0;
  const totalAsset=sumF(m,ASF),totalDebt=sumF(m,DF),netAsset=totalAsset-totalDebt;
  return{income,fixed,saving,living,budget,remain,savingRate,totalAsset,totalDebt,netAsset};
}
function fmt(n){return Math.round(n||0).toLocaleString("ko-KR");}
function fw(n){const v=Math.round(n||0);if(Math.abs(v)>=100000000)return(v<0?"-":"")+(Math.abs(v)/100000000).toFixed(1)+"억";if(Math.abs(v)>=10000)return(v<0?"-":"")+(Math.abs(v)/10000).toFixed(0)+"만";return(v<0?"-":"")+Math.abs(v).toLocaleString("ko-KR");}
function lpColor(lp){return lp>100?"#f87171":lp>80?"#fb923c":"#34d399";}
function lpBadge(lp){return lp>100?"badge-bad":lp>80?"badge-warn":"badge-good";}
function lpText(lp){return lp>100?"초과":lp>80?"주의":"양호";}

// ===== 저장/불러오기 =====
function saveData(){try{localStorage.setItem(STORAGE_KEY,JSON.stringify({months,goals,dark}));}catch(e){}}
function loadData(){
  try{
    const raw=localStorage.getItem(STORAGE_KEY);
    if(raw){const d=JSON.parse(raw);if(d.months)months=d.months;if(d.goals)goals=d.goals;if(d.dark!==undefined)dark=d.dark;}
  }catch(e){}
}

// ===== 토스트 =====
let toastTimer;
function showToast(msg){
  const el=document.getElementById("toast");
  el.textContent=msg;el.style.display="block";
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>{el.style.display="none";},2500);
}

// ===== 다크모드 =====
function toggleDark(){
  dark=!dark;
  document.body.classList.toggle("light",!dark);
  document.getElementById("dark-btn").textContent=dark?"☀️":"🌙";
  saveData();render();
}

// ===== 탭 =====
function setTab(tab){
  currentTab=tab;
  document.querySelectorAll(".tab-content").forEach(el=>el.style.display="none");
  document.querySelectorAll(".tab-btn").forEach(el=>el.classList.remove("active"));
  document.getElementById("tab-"+tab).style.display="block";
  document.querySelector('[data-tab="'+tab+'"]').classList.add("active");
  if(tab!=="input")editingMonth=null;
  render();
}

// ===== CSV =====
function exportCSV(){
  const hdr=["연도","월",...ALL.map(f=>f.label),"메모"];
  const rows=months.map(m=>[m.year,m.month,...ALL.map(f=>m[f.key]||0),(m.note||"").replace(/,/g," ")]);
  const csv=[hdr,...rows].map(r=>r.join(",")).join("\n");
  const blob=new Blob(["\uFEFF"+csv],{type:"text/csv;charset=utf-8;"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");a.href=url;a.download="또리네_가계부.csv";
  document.body.appendChild(a);a.click();document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showToast("CSV 다운로드 완료 ✓");
}
function importCSV(e){
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=ev=>{
    try{
      const text=ev.target.result.replace(/^\uFEFF/,"");
      const lines=text.split(/\r?\n/).map(l=>l.trim()).filter(Boolean);
      if(lines.length<2){showToast("파일 형식이 맞지 않습니다.");return;}
      const parsed=lines.slice(1).map(line=>{
        const v=line.split(",");
        const m=empty(Number(v[0]),Number(v[1]));
        ALL.forEach((f,i)=>{m[f.key]=Number(v[i+2])||0;});
        m.note=v[v.length-1]||"";return m;
      }).filter(m=>m.year>0&&m.month>0);
      months=parsed.sort((a,b)=>a.year*100+a.month-(b.year*100+b.month));
      saveData();render();
      showToast("CSV 불러오기 완료! "+parsed.length+"개월");
    }catch(e){showToast("파일 읽기 오류");}
  };
  reader.readAsText(file,"UTF-8");e.target.value="";
}

// ===== 모달 =====
function openModal(){document.getElementById("modal-overlay").classList.add("open");}
function closeModal(){document.getElementById("modal-overlay").classList.remove("open");}
function doReset(){
  months=[];goals=[...DEFAULT_GOALS];
  localStorage.removeItem(STORAGE_KEY);
  closeModal();showToast("초기화되었습니다.");render();
}

// ===== 편집 =====
function startNew(){
  const now=new Date();const y=now.getFullYear(),mo=now.getMonth()+1;
  const ex=months.find(m=>m.year===y&&m.month===mo);
  editingMonth=ex?{...ex}:Object.assign(empty(y,mo),{salary:5050330,insurance:450000});
  setTab("input");
}
function startEdit(y,m){
  const ex=months.find(d=>d.year===y&&d.month===m);
  if(ex){editingMonth={...ex};setTab("input");}
}
function deleteMonth(y,m){
  if(!confirm(y+"년 "+m+"월 데이터를 삭제할까요?"))return;
  months=months.filter(d=>!(d.year===y&&d.month===m));
  saveData();render();showToast("삭제되었습니다.");
}
function saveEdit(){
  if(!editingMonth)return;
  const idx=months.findIndex(m=>m.year===editingMonth.year&&m.month===editingMonth.month);
  if(idx>=0)months[idx]=editingMonth;
  else months=[...months,editingMonth].sort((a,b)=>a.year*100+a.month-(b.year*100+b.month));
  editingMonth=null;saveData();setTab("dashboard");showToast("저장되었습니다 ✓");
}
function updateField(key,val){if(editingMonth)editingMonth[key]=Number(val)||0;}
function addGoal(){
  const l=document.getElementById("gl").value;
  const t=document.getElementById("gt").value;
  if(!l||!t)return;
  goals.push({id:Date.now().toString(),label:l,target:Number(t)});
  document.getElementById("gl").value="";document.getElementById("gt").value="";
  saveData();renderAssets();showToast("목표 추가 ✓");
}
function removeGoal(id){goals=goals.filter(g=>g.id!==id);saveData();renderAssets();}

// ===== 렌더 헬퍼 =====
function metricCard(label,value,color,sub,icon){
  return `<div class="card metric-card">
    <div class="metric-icon">${icon||""}</div>
    <div class="metric-label">${label}</div>
    <div class="metric-val" style="color:${color}">${value}<span>원</span></div>
    ${sub?`<div class="metric-sub" style="color:${color}">${sub}</div>`:""}
  </div>`;
}
function sectionCard(title,icon,accent,fields,ed,extra){
  const total=sumF(ed,fields);
  const rows=fields.map(f=>`
    <div class="input-row">
      <label>${f.label}</label>
      <input type="number" value="${ed[f.key]||""}" placeholder="0"
        onchange="updateField('${f.key}',this.value)" oninput="updateField('${f.key}',this.value)"/>
    </div>`).join("");
  return `<div class="card section-card">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
      <div style="display:flex;align-items:center;gap:7px">
        <span style="font-size:14px">${icon}</span>
        <span style="font-size:13px;font-weight:600">${title}</span>
      </div>
      <span style="font-size:13px;font-weight:700;color:${accent}">${fmt(total)}원</span>
    </div>
    ${rows}
    ${extra||""}
  </div>`;
}

// ===== 차트 생성 =====
function destroyCharts(){
  [chartPie,chartBar,chartLine,chartNet].forEach(c=>{if(c)c.destroy();});
  chartPie=chartBar=chartLine=chartNet=null;
}

function createPieChart(canvasId,data){
  const ctx=document.getElementById(canvasId);if(!ctx)return null;
  return new Chart(ctx,{type:"doughnut",data:{
    labels:data.map(d=>d.name),
    datasets:[{data:data.map(d=>d.value),backgroundColor:PALETTE,borderWidth:0,hoverOffset:6}]
  },options:{responsive:true,maintainAspectRatio:false,cutout:"62%",plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>c.label+": "+fmt(c.raw)+"원"}}}}});
}
function createBarChart(canvasId,data){
  const ctx=document.getElementById(canvasId);if(!ctx)return null;
  return new Chart(ctx,{type:"bar",data:{
    labels:data.map(d=>d.name),
    datasets:[{data:data.map(d=>d.value),backgroundColor:PALETTE,borderRadius:4,borderSkipped:false}]
  },options:{indexAxis:"y",responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>fmt(c.raw)+"원"}}},scales:{x:{ticks:{callback:v=>fw(v),color:"#4a5568",font:{size:10}},grid:{color:"rgba(255,255,255,0.04)"}},y:{ticks:{color:"#8892a4",font:{size:11}},grid:{display:false}}}}});
}
function createLineChart(canvasId,labels,datasets){
  const ctx=document.getElementById(canvasId);if(!ctx)return null;
  return new Chart(ctx,{type:"line",data:{labels,datasets},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:"#8892a4",boxWidth:12,font:{size:12}}}},scales:{x:{ticks:{color:"#4a5568",font:{size:11}},grid:{color:"rgba(255,255,255,0.04)"}},y:{ticks:{callback:v=>fw(v),color:"#4a5568",font:{size:10}},grid:{color:"rgba(255,255,255,0.04)"}}},interaction:{mode:"index",intersect:false}}});
}

            <div style="display:flex;gap:10px;align-items:center">
              <span style="color:var(--t3);font-size:12px">${fw(g.target)}원</span>
              <span style="color:${pct>=100?"#34d399":"#a78bfa"};font-weight:700">${pct.toFixed(1)}%</span>
              <button onclick="removeGoal('${g.id}')" style="background:none;border:none;color:var(--t3);font-size:16px;padding:0;line-height:1;opacity:.6">×</button>
            </div>
          </div>
          <div class="progress-wrap" style="height:11px"><div class="progress-bar" style="width:${pct}%;background:${pct>=100?"linear-gradient(90deg,#34d399,#4ade80)":"linear-gradient(90deg,#a78bfa,#818cf8)"}"></div></div>
          <div style="font-size:11px;color:var(--t3);margin-top:4px">${pct<100?"목표까지 "+fw(g.target-c.netAsset)+"원 남음":"🎉 달성 완료!"}</div>
        </div>`}).join("")}
      <div style="display:flex;gap:8px;margin-top:6px;flex-wrap:wrap">
        <input id="gl" placeholder="목표 이름" style="flex:1;min-width:100px"/>
        <input id="gt" type="number" placeholder="목표 금액" style="flex:1;min-width:100px"/>
        <button onclick="addGoal()" class="btn-primary" style="padding:9px 14px;white-space:nowrap">+ 추가</button>
      </div>
    </div>
  `;
  if(months.length>1){
    setTimeout(()=>{
      chartNet=createLineChart("chart-net",lineLabels,[
        {label:"순자산",data:lineNet,borderColor:"#a78bfa",backgroundColor:"rgba(167,139,250,.15)",tension:.4,fill:true,pointBackgroundColor:"#a78bfa",pointRadius:5,pointBorderWidth:2,pointBorderColor:"var(--bg1)"}
      ]);
    },50);
  }
}

// ===== 히스토리 =====
function renderHistory(){
  const el=document.getElementById("tab-history");
  el.innerHTML=`
    <div style="font-size:19px;font-weight:700;margin-bottom:3px">월별 히스토리</div>
    <div style="font-size:13px;color:var(--t2);margin-bottom:18px">${months.length}개월 데이터</div>
    ${months.length===0?`<div style="text-align:center;padding:60px;color:var(--t3)">데이터가 없습니다.</div>`:
    [...months].reverse().map(m=>{
      const cc=calcM(m),mlp=cc.budget>0?(cc.living/cc.budget)*100:0;
      const mc=lpColor(mlp);
      return`
      <div class="card section-card" style="margin-bottom:10px">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
          <div style="display:flex;align-items:center;gap:10px">
            <div class="date-badge"><span class="year">${m.year}</span><span class="month">${m.month}월</span></div>
            <div>
              <div style="display:flex;align-items:center;gap:7px">
                <span style="font-size:14px;font-weight:600">${m.year}년 ${m.month}월</span>
                <span class="badge ${lpBadge(mlp)}">${lpText(mlp)}</span>
              </div>
              ${m.note?`<div style="font-size:12px;color:var(--t3);margin-top:2px">${m.note}</div>`:""}
            </div>
          </div>
          <div style="display:flex;gap:6px">
            <button onclick="startEdit(${m.year},${m.month})" style="background:var(--bg2);border:1px solid var(--bd);border-radius:8px;padding:4px 11px;font-size:12px;color:var(--t2);font-weight:500">수정</button>
            <button onclick="deleteMonth(${m.year},${m.month})" style="background:rgba(248,113,113,.08);border:1px solid rgba(248,113,113,.2);border-radius:8px;padding:4px 11px;font-size:12px;color:#f87171;font-weight:500">삭제</button>
          </div>
        </div>
        <div style="display:flex;flex-wrap:wrap;gap:7px">
          ${[["총수입",cc.income,"#a78bfa"],["저축",cc.saving,"#34d399"],["고정비",cc.fixed,"#fb923c"],["생활비",cc.living,"#60a5fa"],["순자산",cc.netAsset,"#e879f9"]].map(([lb,v,col])=>`
            <div style="background:var(--bg2);border-radius:9px;padding:7px 11px;min-width:75px">
              <div style="font-size:10px;color:var(--t3);margin-bottom:2px;font-weight:500">${lb}</div>
              <div style="font-size:12px;font-weight:700;color:${col}">${fw(v)}<span style="font-size:10px;font-weight:500">원</span></div>
            </div>`).join("")}
          <div style="background:var(--bg2);border-radius:9px;padding:7px 11px;min-width:65px">
            <div style="font-size:10px;color:var(--t3);margin-bottom:2px;font-weight:500">저축률</div>
            <div style="font-size:12px;font-weight:700;color:#34d399">${cc.savingRate.toFixed(1)}<span style="font-size:10px;font-weight:500">%</span></div>
          </div>
        </div>
      </div>`}).join("")}
  `;
}

// ===== 메인 렌더 =====
function render(){
  if(currentTab==="dashboard")renderDashboard();
  else if(currentTab==="input")renderInput();
  else if(currentTab==="living")renderLiving();
  else if(currentTab==="assets")renderAssets();
  else if(currentTab==="history")renderHistory();
}

// ===== 초기화 =====
loadData();
document.body.classList.toggle("light",!dark);
document.getElementById("dark-btn").textContent=dark?"☀️":"🌙";
render();
</script>
</body>
</html>
