<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>또리네 가계부</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;}
  input[type=number]::-webkit-inner-spin-button,
  input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none;margin:0;}
  input[type=number]{-moz-appearance:textfield;}
  ::-webkit-scrollbar{width:6px;height:6px;}
  ::-webkit-scrollbar-track{background:transparent;}
  ::-webkit-scrollbar-thumb{background:rgba(167,139,250,0.3);border-radius:3px;}
  select option{background:#1a1a2e;color:#f1f5f9;}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useCallback,useEffect}=React;
const {LineChart,Line,AreaChart,Area,BarChart,Bar,PieChart,Pie,Cell,XAxis,YAxis,CartesianGrid,Tooltip,ResponsiveContainer}=Recharts;

const STORAGE_KEY="ttori_budget_v1";
const IF=[{key:"salary",label:"월 기본급"},{key:"bonus",label:"평가급"},{key:"holiday",label:"명절상여"},{key:"travel",label:"출장여비"},{key:"overtime",label:"초과근무수당"},{key:"welfare",label:"복리후생비+식비"},{key:"otherIncome",label:"기타수입"}];
const FF=[{key:"insurance",label:"보험료"},{key:"communication",label:"통신비"},{key:"subscription",label:"구독서비스"},{key:"carInsurance",label:"차량보험 월할"},{key:"carTax",label:"자동차세 월할"},{key:"maintenance",label:"주택관리비"},{key:"electricity",label:"전기요금"},{key:"water",label:"수도요금"},{key:"gas",label:"가스요금"},{key:"internet",label:"인터넷요금"},{key:"waterPurifier",label:"정수기 렌탈"},{key:"otherFixed",label:"기타 고정지출"}];
const SF=[{key:"cashSaving",label:"현금저축"},{key:"stock",label:"주식투자"},{key:"pension",label:"퇴직연금 추가납입"},{key:"housing",label:"주택자금 적립"},{key:"otherSaving",label:"기타 투자"}];
const LF=[{key:"food",label:"식비"},{key:"dining",label:"외식"},{key:"cafe",label:"카페/간식"},{key:"transport",label:"교통/주유"},{key:"shopping",label:"쇼핑"},{key:"culture",label:"문화/여행"},{key:"gift",label:"경조사/선물"},{key:"husbandAllowance",label:"남편 용돈"},{key:"wifeAllowance",label:"아내 용돈"},{key:"otherLiving",label:"기타"}];
const ASF=[{key:"cash",label:"현금"},{key:"deposit",label:"예적금"},{key:"stockAsset",label:"주식"},{key:"pensionAsset",label:"퇴직연금"},{key:"apt",label:"청약통장"},{key:"realestate",label:"부동산"},{key:"otherAsset",label:"기타자산"}];
const DF=[{key:"card",label:"신용카드 미결제"},{key:"loan",label:"대출"},{key:"otherDebt",label:"기타부채"}];
const ALL=[...IF,...FF,...SF,...LF,...ASF,...DF];
const PALETTE=["#a78bfa","#34d399","#fb923c","#60a5fa","#f472b6","#facc15","#4ade80","#38bdf8","#e879f9","#a3e635"];
const DG_DEFAULT=[{id:"g1",label:"입주자금 목표 (2028)",target:200000000},{id:"g2",label:"FIRE 목표 순자산",target:1000000000}];

function empty(y,m){const o={year:y,month:m,note:""};ALL.forEach(f=>{o[f.key]=0;});return o;}

const sumF=(m,fs)=>fs.reduce((s,f)=>s+(Number(m[f.key])||0),0);
const cm=m=>{
  const income=sumF(m,IF),fixed=sumF(m,FF),saving=sumF(m,SF),living=sumF(m,LF);
  const budget=income-fixed-saving,remain=budget-living,savingRate=income>0?(saving/income)*100:0;
  const totalAsset=sumF(m,ASF),totalDebt=sumF(m,DF),netAsset=totalAsset-totalDebt;
  return{income,fixed,saving,living,budget,remain,savingRate,totalAsset,totalDebt,netAsset};
};
const fmt=n=>Math.round(n||0).toLocaleString("ko-KR");
const fw=n=>{const v=Math.round(n||0);if(Math.abs(v)>=100000000)return(v<0?"-":"")+(Math.abs(v)/100000000).toFixed(1)+"억";if(Math.abs(v)>=10000)return(v<0?"-":"")+(Math.abs(v)/10000).toFixed(0)+"만";return(v<0?"-":"")+Math.abs(v).toLocaleString("ko-KR");};

const CT=({active,payload,label})=>{
  if(!active||!payload?.length)return null;
  return(
    <div style={{background:"#1a1a2e",border:"1px solid rgba(167,139,250,0.3)",borderRadius:10,padding:"10px 14px",fontSize:12}}>
      <div style={{color:"#94a3b8",marginBottom:6}}>{label}</div>
      {payload.map((p,i)=><div key={i} style={{color:p.color,fontWeight:600}}>{p.name}: {fmt(p.value)}원</div>)}
    </div>
  );
};

function App(){
  const [dark,setDark]=useState(true);
  const [tab,setTab]=useState("dashboard");
  const [months,setMonths]=useState([]);
  const [goals,setGoals]=useState(DG_DEFAULT);
  const [ed,setEd]=useState(null);
  const [gl,setGl]=useState("");
  const [gt,setGt]=useState("");
  const [toast,setToast]=useState(null);
  const [confirmModal,setConfirmModal]=useState(false);
  const [loaded,setLoaded]=useState(false);

  // localStorage 불러오기
  useEffect(()=>{
    try{
      const raw=localStorage.getItem(STORAGE_KEY);
      if(raw){
        const d=JSON.parse(raw);
        if(d.months)setMonths(d.months);
        if(d.goals)setGoals(d.goals);
        if(d.dark!==undefined)setDark(d.dark);
      }
    }catch(e){}
    setLoaded(true);
  },[]);

  // localStorage 저장
  useEffect(()=>{
    if(!loaded)return;
    try{localStorage.setItem(STORAGE_KEY,JSON.stringify({months,goals,dark}));}catch(e){}
  },[months,goals,dark,loaded]);

  const showT=msg=>{setToast(msg);setTimeout(()=>setToast(null),2800);};
  const lat=months[months.length-1]||null;
  const prv=months[months.length-2]||null;
  const c=lat?cm(lat):null;
  const pc=prv?cm(prv):null;
  const lp=c&&c.budget>0?(c.living/c.budget)*100:0;
  const lp_color=lp>100?"#f87171":lp>80?"#fb923c":"#34d399";

  const startEdit=m=>{setEd({...m});setTab("input");};
  const startNew=()=>{
    const now=new Date();const y=now.getFullYear(),mo=now.getMonth()+1;
    const ex=months.find(m=>m.year===y&&m.month===mo);
    if(ex){startEdit(ex);return;}
    const nm=empty(y,mo);nm.salary=5050330;nm.insurance=450000;
    setEd(nm);setTab("input");
  };
  const saveEd=()=>{
    if(!ed)return;
    const idx=months.findIndex(m=>m.year===ed.year&&m.month===ed.month);
    const next=idx>=0?months.map((m,i)=>i===idx?ed:m):[...months,ed].sort((a,b)=>a.year*100+a.month-(b.year*100+b.month));
    setMonths(next);setEd(null);showT("저장되었습니다 ✓");
  };
  const delM=m=>{
    if(!window.confirm(m.year+"년 "+m.month+"월 데이터를 삭제할까요?"))return;
    setMonths(months.filter(d=>!(d.year===m.year&&d.month===m.month)));
    showT("삭제되었습니다.");
  };
  const sf=(k,v)=>setEd(p=>({...p,[k]:v}));

  const exportCSV=useCallback(()=>{
    const hdr=["연도","월",...ALL.map(f=>f.label),"메모"];
    const rows=months.map(m=>[m.year,m.month,...ALL.map(f=>m[f.key]||0),(m.note||"").replace(/,/g," ")]);
    const csv=[hdr,...rows].map(r=>r.join(",")).join("\n");
    const blob=new Blob(["\uFEFF"+csv],{type:"text/csv;charset=utf-8;"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");
    a.href=url;a.download="또리네_가계부.csv";
    document.body.appendChild(a);a.click();document.body.removeChild(a);
    URL.revokeObjectURL(url);
    showT("CSV 다운로드 완료 ✓");
  },[months]);

  const importCSV=e=>{
    const file=e.target.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=ev=>{
      try{
        const text=ev.target.result.replace(/^\uFEFF/,"");
        const lines=text.split(/\r?\n/).map(l=>l.trim()).filter(Boolean);
        if(lines.length<2){showT("파일 형식이 맞지 않습니다.");return;}
        const parsed=lines.slice(1).map(line=>{
          const v=line.split(",");
          const m=empty(Number(v[0]),Number(v[1]));
          ALL.forEach((f,i)=>{m[f.key]=Number(v[i+2])||0;});
          m.note=v[v.length-1]||"";
          return m;
        }).filter(m=>m.year>0&&m.month>0);
        setMonths(parsed.sort((a,b)=>a.year*100+a.month-(b.year*100+b.month)));
        showT("CSV 불러오기 완료! "+parsed.length+"개월");
      }catch(e){showT("파일 읽기 오류");}
    };
    reader.readAsText(file,"UTF-8");
    e.target.value="";
  };

  const resetAll=()=>{
    setMonths([]);setGoals(DG_DEFAULT);setConfirmModal(false);
    localStorage.removeItem(STORAGE_KEY);
    showT("초기화되었습니다.");
  };

  const autoComments=()=>{
    if(!c||!lat)return[];
    const r=[`이번 달 저축률은 ${c.savingRate.toFixed(1)}%입니다.`];
    if(pc){const d=c.living-pc.living;r.push(`생활비는 전월 대비 ${d>=0?"+":""}${pc.living>0?((d/pc.living)*100).toFixed(1):0}% ${d>=0?"증가":"감소"}했습니다.`);}
    const top=LF.map(f=>({label:f.label,val:lat[f.key]||0})).sort((a,b)=>b.val-a.val);
    if(top[0]?.val>0)r.push(`가장 큰 지출 항목은 ${top[0].label}(${fmt(top[0].val)}원)입니다.`);
    if(c.remain>=0)r.push(`잔여금은 ${fw(c.remain)}원입니다.`);
    else r.push(`⚠️ 생활비 예산을 ${fw(Math.abs(c.remain))}원 초과했습니다.`);
    if(pc){const d=c.netAsset-pc.netAsset;r.push(`순자산은 전월 대비 ${d>=0?"+":""}${fw(d)}원 ${d>=0?"증가":"감소"}했습니다.`);}
    return r;
  };

  const pieD=lat?LF.map(f=>({name:f.label,value:lat[f.key]||0})).filter(d=>d.value>0):[];
  const barD=lat?LF.map(f=>({name:f.label,value:lat[f.key]||0})).sort((a,b)=>b.value-a.value).slice(0,8):[];
  const lineD=months.map(m=>{const cc=cm(m);return{name:m.month+"월",생활비:cc.living,저축:cc.saving,순자산:cc.netAsset};});
  const TABS=[{k:"dashboard",l:"대시보드",icon:"📊"},{k:"input",l:"입력",icon:"✏️"},{k:"living",l:"생활비",icon:"🛒"},{k:"assets",l:"자산/목표",icon:"🏦"},{k:"history",l:"히스토리",icon:"📅"}];
  const SECTIONS=[[IF,"수입","#a78bfa","💰"],[SF,"저축/투자 (먼저 확보)","#34d399","📈"],[FF,"고정지출","#fb923c","🔒"],[LF,"생활비","#60a5fa","🛒"],[ASF,"자산 현황","#e879f9","🏦"],[DF,"부채","#f87171","⚠️"]];

  const bg=dark?"#0d0d1a":"#f8f9fc";
  const bg1=dark?"#13131f":"#ffffff";
  const bg2=dark?"#1a1a2e":"#f1f3f8";
  const bg3=dark?"#1e1e32":"#e8ebf2";
  const t1=dark?"#f1f5f9":"#0f172a";
  const t2=dark?"#8892a4":"#64748b";
  const t3=dark?"#4a5568":"#94a3b8";
  const bd=dark?"rgba(255,255,255,0.07)":"rgba(0,0,0,0.07)";
  const bd2=dark?"rgba(255,255,255,0.13)":"rgba(0,0,0,0.13)";
  const card={background:bg1,border:"1px solid "+bd,borderRadius:16};
  const inp={background:bg2,border:"1px solid "+bd,borderRadius:10,color:t1,fontSize:13,padding:"9px 12px",width:"100%",boxSizing:"border-box",outline:"none"};

  if(!loaded)return <div style={{minHeight:"100vh",background:"#0d0d1a",display:"flex",alignItems:"center",justifyContent:"center",color:"#a78bfa",fontSize:16}}>불러오는 중...</div>;

  return(
    <div style={{minHeight:"100vh",background:bg,color:t1,fontFamily:"-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif",fontSize:14}}>

      {/* 초기화 모달 */}
      {confirmModal&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.7)",backdropFilter:"blur(6px)",zIndex:9998,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
          <div style={{background:bg1,border:"1px solid rgba(248,113,113,0.3)",borderRadius:20,padding:"28px 32px",maxWidth:360,width:"100%"}}>
            <div style={{fontSize:36,textAlign:"center",marginBottom:12}}>🗑️</div>
            <div style={{fontSize:17,fontWeight:700,color:t1,textAlign:"center",marginBottom:8}}>전체 초기화</div>
            <div style={{fontSize:13,color:t2,textAlign:"center",lineHeight:1.8,marginBottom:24}}>
              모든 월별 데이터와 목표가 삭제됩니다.<br/>
              <span style={{color:"#f87171",fontWeight:600}}>이 작업은 되돌릴 수 없습니다.</span>
            </div>
            <div style={{display:"flex",gap:10}}>
              <button onClick={()=>setConfirmModal(false)} style={{flex:1,background:bg2,border:"1px solid "+bd,borderRadius:10,padding:"11px 0",fontSize:14,cursor:"pointer",color:t2,fontWeight:500}}>취소</button>
              <button onClick={resetAll} style={{flex:1,background:"linear-gradient(135deg,#ef4444,#dc2626)",color:"#fff",border:"none",borderRadius:10,padding:"11px 0",fontSize:14,cursor:"pointer",fontWeight:700}}>초기화할게요</button>
            </div>
          </div>
        </div>
      )}

      {/* 토스트 */}
      {toast&&(
        <div style={{position:"fixed",top:20,left:"50%",transform:"translateX(-50%)",background:"#1e1e32",color:"#fff",padding:"10px 20px",borderRadius:24,fontSize:13,zIndex:9999,border:"1px solid rgba(167,139,250,0.4)",whiteSpace:"nowrap"}}>
          {toast}
        </div>
      )}

      {/* 헤더 */}
      <div style={{background:dark?"rgba(13,13,26,0.95)":"rgba(255,255,255,0.95)",backdropFilter:"blur(20px)",borderBottom:"1px solid "+bd,position:"sticky",top:0,zIndex:100}}>
        <div style={{maxWidth:1100,margin:"0 auto",padding:"0 16px",display:"flex",alignItems:"center",justifyContent:"space-between",height:56}}>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <div style={{width:30,height:30,borderRadius:9,background:"linear-gradient(135deg,#a78bfa,#60a5fa)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:15}}>💜</div>
            <span style={{fontSize:16,fontWeight:700,letterSpacing:-0.5}}>또리네 가계부</span>
          </div>
          <div style={{display:"flex",gap:8,alignItems:"center"}}>
            <button onClick={startNew} style={{background:"linear-gradient(135deg,#a78bfa,#818cf8)",color:"#fff",border:"none",borderRadius:10,padding:"7px 14px",fontSize:13,cursor:"pointer",fontWeight:600}}>+ 이번 달 입력</button>
            <button onClick={()=>setDark(d=>!d)} style={{background:bg2,border:"1px solid "+bd,borderRadius:10,padding:"7px 11px",fontSize:14,cursor:"pointer",color:t2}}>{dark?"☀️":"🌙"}</button>
          </div>
        </div>
        <div style={{maxWidth:1100,margin:"0 auto",padding:"0 16px",display:"flex",overflowX:"auto",gap:2}}>
          {TABS.map(t=>(
            <button key={t.k} onClick={()=>{if(t.k!=="input")setEd(null);setTab(t.k);}}
              style={{background:tab===t.k?bg2:"none",border:"none",padding:"8px 14px",fontSize:13,cursor:"pointer",color:tab===t.k?"#a78bfa":t2,borderRadius:"8px 8px 0 0",fontWeight:tab===t.k?600:400,whiteSpace:"nowrap",display:"flex",alignItems:"center",gap:5}}>
              <span style={{fontSize:13}}>{t.icon}</span>{t.l}
            </button>
          ))}
        </div>
      </div>

      <div style={{maxWidth:1100,margin:"0 auto",padding:"20px 16px"}}>

        {/* ===== 대시보드 ===== */}
        {tab==="dashboard"&&(c===null?(
          <div style={{textAlign:"center",padding:"80px 0"}}>
            <div style={{fontSize:52,marginBottom:16}}>📊</div>
            <div style={{fontSize:22,fontWeight:700,marginBottom:8}}>데이터가 없어요</div>
            <div style={{fontSize:14,color:t2,marginBottom:24}}>이번 달 수입과 지출을 입력해보세요</div>
            <button onClick={startNew} style={{background:"linear-gradient(135deg,#a78bfa,#818cf8)",color:"#fff",border:"none",borderRadius:12,padding:"12px 28px",fontSize:15,cursor:"pointer",fontWeight:600}}>+ 데이터 입력하기</button>
          </div>
        ):(
          <div>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:20}}>
              <div>
                <div style={{fontSize:22,fontWeight:700,letterSpacing:-0.5}}>{lat.year}년 {lat.month}월</div>
                <div style={{fontSize:13,color:t2,marginTop:2}}>최근 기준 데이터</div>
              </div>
              <div style={{background:lp>100?"rgba(248,113,113,0.1)":lp>80?"rgba(251,146,60,0.1)":"rgba(52,211,153,0.1)",border:"1px solid "+(lp>100?"rgba(248,113,113,0.3)":lp>80?"rgba(251,146,60,0.3)":"rgba(52,211,153,0.3)"),borderRadius:10,padding:"6px 14px",fontSize:13,fontWeight:600,color:lp_color}}>
                {lp>100?"예산 초과 ✗":lp>80?"예산 주의 !":"예산 양호 ✓"}
              </div>
            </div>

            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(155px,1fr))",gap:10,marginBottom:18}}>
              {[
                {label:"총수입",val:c.income,color:"#a78bfa",icon:"💰"},
                {label:"저축/투자",val:c.saving,color:"#34d399",icon:"📈",sub:c.savingRate.toFixed(1)+"%"},
                {label:"고정지출",val:c.fixed,color:"#fb923c",icon:"🔒"},
                {label:"생활비",val:c.living,color:lp_color,icon:"🛒",sub:"예산 "+lp.toFixed(0)+"%"},
                {label:"잔여금",val:c.remain,color:c.remain>=0?"#34d399":"#f87171",icon:"💳"},
                {label:"순자산",val:c.netAsset,color:"#60a5fa",icon:"🏦",sub:pc?"전월比 "+(c.netAsset-pc.netAsset>=0?"+":"")+fw(c.netAsset-pc.netAsset):null},
              ].map(item=>(
                <div key={item.label} style={{...card,padding:"14px 16px",position:"relative",overflow:"hidden"}}>
                  <div style={{position:"absolute",top:-8,right:-8,fontSize:32,opacity:0.07}}>{item.icon}</div>
                  <div style={{fontSize:10,color:t3,fontWeight:500,letterSpacing:0.5,textTransform:"uppercase",marginBottom:7}}>{item.label}</div>
                  <div style={{fontSize:19,fontWeight:700,color:item.color,letterSpacing:-0.5,lineHeight:1}}>{item.val<0?"-":""}{fw(Math.abs(item.val))}<span style={{fontSize:12,fontWeight:500,marginLeft:2}}>원</span></div>
                  {item.sub&&<div style={{fontSize:11,color:item.color,marginTop:4,opacity:0.8}}>{item.sub}</div>}
                </div>
              ))}
            </div>

            <div style={{...card,padding:"16px 20px",marginBottom:18}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
                <div>
                  <span style={{fontSize:13,fontWeight:600}}>이번 달 생활비</span>
                  <span style={{fontSize:12,color:t2,marginLeft:8}}>예산 {fmt(c.budget)}원</span>
                </div>
                <span style={{fontSize:14,fontWeight:700,color:lp_color}}>{lp.toFixed(1)}%</span>
              </div>
              <div style={{background:bg3,borderRadius:8,height:10,overflow:"hidden"}}>
                <div style={{height:"100%",width:Math.min(lp,100)+"%",background:"linear-gradient(90deg,"+lp_color+","+lp_color+"99)",borderRadius:8}}/>
              </div>
              <div style={{display:"flex",justifyContent:"space-between",marginTop:7,fontSize:12,color:t3}}>

                <input value={gl} onChange={e=>setGl(e.target.value)} placeholder="목표 이름" style={{...inp,flex:1,minWidth:100}}/>
                <input value={gt} onChange={e=>setGt(e.target.value)} type="number" placeholder="목표 금액" style={{...inp,flex:1,minWidth:100}}/>
                <button onClick={()=>{if(!gl||!gt)return;setGoals([...goals,{id:Date.now().toString(),label:gl,target:Number(gt)}]);setGl("");setGt("");showT("목표 추가 ✓");}}
                  style={{background:"linear-gradient(135deg,#a78bfa,#818cf8)",color:"#fff",border:"none",borderRadius:10,padding:"9px 14px",fontSize:13,cursor:"pointer",fontWeight:600,whiteSpace:"nowrap"}}>+ 추가</button>
              </div>
            </div>
          </div>
        ))}

        {/* ===== 히스토리 ===== */}
        {tab==="history"&&(
          <div>
            <div style={{fontSize:19,fontWeight:700,marginBottom:3}}>월별 히스토리</div>
            <div style={{fontSize:13,color:t2,marginBottom:18}}>{months.length}개월 데이터</div>
            {months.length===0?(
              <div style={{textAlign:"center",padding:60,color:t3}}>데이터가 없습니다.</div>
            ):(
              <div style={{display:"flex",flexDirection:"column",gap:10}}>
                {[...months].reverse().map(m=>{
                  const cc=cm(m);const mlp=cc.budget>0?(cc.living/cc.budget)*100:0;
                  const mc=mlp>100?"#f87171":mlp>80?"#fb923c":"#34d399";
                  return(
                    <div key={m.year+"-"+m.month} style={{...card,padding:"14px 18px"}}>
                      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
                        <div style={{display:"flex",alignItems:"center",gap:10}}>
                          <div style={{width:42,height:42,borderRadius:11,background:"rgba(167,139,250,0.1)",border:"1px solid rgba(167,139,250,0.2)",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                            <span style={{fontSize:9,color:"#a78bfa",fontWeight:600,lineHeight:1}}>{m.year}</span>
                            <span style={{fontSize:14,color:"#a78bfa",fontWeight:700,lineHeight:1.3}}>{m.month}월</span>
                          </div>
                          <div>
                            <div style={{display:"flex",alignItems:"center",gap:7}}>
                              <span style={{fontSize:14,fontWeight:600}}>{m.year}년 {m.month}월</span>
                              <span style={{fontSize:11,padding:"2px 7px",borderRadius:6,background:mlp>100?"rgba(248,113,113,0.1)":mlp>80?"rgba(251,146,60,0.1)":"rgba(52,211,153,0.1)",color:mc,fontWeight:600}}>
                                {mlp>100?"초과":mlp>80?"주의":"양호"}
                              </span>
                            </div>
                            {m.note&&<div style={{fontSize:12,color:t3,marginTop:2}}>{m.note}</div>}
                          </div>
                        </div>
                        <div style={{display:"flex",gap:6}}>
                          <button onClick={()=>startEdit(m)} style={{background:bg2,border:"1px solid "+bd,borderRadius:8,padding:"4px 11px",fontSize:12,cursor:"pointer",color:t2,fontWeight:500}}>수정</button>
                          <button onClick={()=>delM(m)} style={{background:"rgba(248,113,113,0.08)",border:"1px solid rgba(248,113,113,0.2)",borderRadius:8,padding:"4px 11px",fontSize:12,cursor:"pointer",color:"#f87171",fontWeight:500}}>삭제</button>
                        </div>
                      </div>
                      <div style={{display:"flex",flexWrap:"wrap",gap:7}}>
                        {[["총수입",cc.income,"#a78bfa"],["저축",cc.saving,"#34d399"],["고정비",cc.fixed,"#fb923c"],["생활비",cc.living,"#60a5fa"],["순자산",cc.netAsset,"#e879f9"]].map(([lb,v,col])=>(
                          <div key={lb} style={{background:bg2,borderRadius:9,padding:"7px 11px",minWidth:75}}>
                            <div style={{fontSize:10,color:t3,marginBottom:2,fontWeight:500}}>{lb}</div>
                            <div style={{fontSize:12,fontWeight:700,color:col}}>{fw(v)}<span style={{fontSize:10,fontWeight:500}}>원</span></div>
                          </div>
                        ))}
                        <div style={{background:bg2,borderRadius:9,padding:"7px 11px",minWidth:65}}>
                          <div style={{fontSize:10,color:t3,marginBottom:2,fontWeight:500}}>저축률</div>
                          <div style={{fontSize:12,fontWeight:700,color:"#34d399"}}>{cc.savingRate.toFixed(1)}<span style={{fontSize:10,fontWeight:500}}>%</span></div>
                        </div>
                      </div>
                    </div>
                  );
                })}
              </div>
            )}
          </div>
        )}

      </div>
    </div>
  );
}

const root=ReactDOM.createRoot(document.getElementById("root"));
root.render(<App/>);
</script>
</body>
</html>
